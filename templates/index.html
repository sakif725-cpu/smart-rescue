<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RescueTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useState } = React;

        const features = [
            {
                title: "Citizen Reporting",
                description: "Enable people to quickly report injured or endangered animals with location details and photos."
            },
            {
                title: "Volunteer Alerts",
                description: "Instantly notify nearby volunteers so rescue teams can respond faster when every minute matters."
            },
            {
                title: "NGO Management",
                description: "Coordinate cases, assign responders, and monitor shelter capacity through a centralized dashboard."
            },
            {
                title: "Live Tracking",
                description: "Track rescue progress in real time from report submission to medical support and safe relocation."
            }
        ];

        function App() {
            const [liveStats, setLiveStats] = useState({
                animalsRescued: 0,
                activeVolunteers: 0,
                partnerNgos: 0
            });

            useEffect(() => {
                const fetchLiveStats = () => {
                    fetch("/api/stats")
                        .then(async (response) => {
                            const data = await response.json();
                            if (!response.ok || !data.success) {
                                throw new Error("Failed to load stats");
                            }
                            setLiveStats(data.stats || {
                                animalsRescued: 0,
                                activeVolunteers: 0,
                                partnerNgos: 0
                            });
                        })
                        .catch(() => {
                        });
                };

                fetchLiveStats();
                const timer = setInterval(fetchLiveStats, 10000);
                return () => clearInterval(timer);
            }, []);

            const stats = [
                {
                    icon: "🐾",
                    value: liveStats.animalsRescued.toLocaleString(),
                    label: "Animals Rescued"
                },
                {
                    icon: "🚑",
                    value: liveStats.activeVolunteers.toLocaleString(),
                    label: "Active Volunteers"
                },
                {
                    icon: "🏥",
                    value: liveStats.partnerNgos.toLocaleString(),
                    label: "Partner NGOs"
                }
            ];

            return (
                <div className="min-h-screen">
                    <main className="mx-auto max-w-7xl px-4 py-12 sm:px-6 lg:px-8">
                        <section className="rounded-2xl bg-white p-8 shadow-sm sm:p-12 lg:p-16">
                            <p className="text-sm font-semibold uppercase tracking-wide text-sky-700">RescueTracker</p>
                            <h1 className="mt-4 text-3xl font-bold leading-tight text-slate-900 sm:text-4xl lg:text-5xl">
                                Faster Animal Rescue Through Community Action
                            </h1>
                            <p className="mt-4 max-w-2xl text-base text-slate-600 sm:text-lg">
                                RescueTracker helps citizens, volunteers, and NGOs collaborate to report, respond, and track rescue operations with clarity and speed.
                            </p>
                            <div className="mt-8 flex flex-col gap-3 sm:flex-row">
                                {% if current_user.is_authenticated %}
                                {% if current_user.role == 'volunteer' %}
                                <a
                                    href="/volunteer"
                                    className="inline-flex items-center justify-center rounded-lg bg-sky-700 px-6 py-3 text-sm font-semibold text-white transition hover:bg-sky-800"
                                >
                                    Revive
                                </a>
                                {% else %}
                                <a
                                    href="/report"
                                    className="inline-flex items-center justify-center rounded-lg bg-sky-700 px-6 py-3 text-sm font-semibold text-white transition hover:bg-sky-800"
                                >
                                    Report a Case
                                </a>
                                {% endif %}
                                <a
                                    href="/logout"
                                    className="inline-flex items-center justify-center rounded-lg border border-slate-300 bg-white px-6 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-100"
                                >
                                    Logout
                                </a>
                                {% else %}
                                <a
                                    href="/login"
                                    className="inline-flex items-center justify-center rounded-lg bg-sky-700 px-6 py-3 text-sm font-semibold text-white transition hover:bg-sky-800"
                                >
                                    Login to Continue
                                </a>
                                <a
                                    href="/register"
                                    className="inline-flex items-center justify-center rounded-lg border border-slate-300 bg-white px-6 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-100"
                                >
                                    Create Account
                                </a>
                                {% endif %}
                            </div>
                        </section>

                        <section className="mt-12">
                            <div className="grid grid-cols-1 gap-4 sm:grid-cols-3">
                                {stats.map((stat) => (
                                    <article key={stat.label} className="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
                                        <p className="text-lg">{stat.icon}</p>
                                        <p className="mt-2 text-2xl font-bold text-slate-900">{stat.value}</p>
                                        <p className="text-sm font-medium text-slate-600">{stat.label}</p>
                                    </article>
                                ))}
                            </div>
                        </section>

                        <section className="mt-12">
                            <h2 className="text-2xl font-bold text-slate-900">Platform Features</h2>
                            <div className="mt-6 grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-4">
                                {features.map((feature) => (
                                    <article key={feature.title} className="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
                                        <h3 className="text-lg font-semibold text-slate-900">{feature.title}</h3>
                                        <p className="mt-2 text-sm leading-6 text-slate-600">{feature.description}</p>
                                    </article>
                                ))}
                            </div>
                        </section>

                        <section className="mt-12 rounded-2xl bg-sky-700 p-6 text-white shadow-sm sm:p-8">
                            <h2 className="text-2xl font-bold">Want to Make a Difference?</h2>
                            <div className="mt-5">
                                {% if current_user.is_authenticated %}
                                {% if current_user.role == 'volunteer' %}
                                <a
                                    href="/volunteer"
                                    className="inline-flex items-center justify-center rounded-lg bg-white px-6 py-3 text-sm font-semibold text-sky-700 transition hover:bg-slate-100"
                                >
                                    Revive
                                </a>
                                {% else %}
                                <a
                                    href="/report"
                                    className="inline-flex items-center justify-center rounded-lg bg-white px-6 py-3 text-sm font-semibold text-sky-700 transition hover:bg-slate-100"
                                >
                                    Report a Case Now
                                </a>
                                {% endif %}
                                {% else %}
                                <a
                                    href="/login"
                                    className="inline-flex items-center justify-center rounded-lg bg-white px-6 py-3 text-sm font-semibold text-sky-700 transition hover:bg-slate-100"
                                >
                                    Login to Join Rescue Operations
                                </a>
                                {% endif %}
                            </div>
                        </section>

                        <footer className="mt-12 border-t border-slate-200 pt-6">
                            <div className="flex flex-wrap items-center gap-x-6 gap-y-2 text-sm font-medium text-slate-600">
                                <a href="#" className="hover:text-slate-900">About</a>
                                <a href="#" className="hover:text-slate-900">Contact</a>
                                <a href="#" className="hover:text-slate-900">Privacy</a>
                                <a href="#" className="hover:text-slate-900">Support</a>
                            </div>
                            <p className="mt-3 pb-2 text-sm text-slate-500">© 2026 Smart Animal Rescue System</p>
                        </footer>
                    </main>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
